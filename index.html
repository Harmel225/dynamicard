<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de Mariage Animée</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Cormorant+Garamond:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --primary: #d4af37;
            --secondary: #1a1a2e;
            --accent: #e8c6a8;
            --light: #f9f5f0;
        }

        body {
            font-family: 'Cormorant Garamond', serif;
            background: linear-gradient(135deg, #f9f5f0 0%, #e8dcc7 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Particules de fond animées */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
            pointer-events: none;
        }

        .particle {
            position: absolute;
            background: radial-gradient(circle, var(--primary) 0%, transparent 70%);
            border-radius: 50%;
            opacity: 0;
            animation: float 8s infinite ease-in-out;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(100vh) scale(0);
                opacity: 0;
            }
            10% {
                opacity: 0.6;
            }
            90% {
                opacity: 0.4;
            }
            100% {
                transform: translateY(-100px) scale(1);
            }
        }

        /* Conteneur principal de la carte */
        .card-container {
            position: relative;
            z-index: 1;
            perspective: 1500px;
        }

        .wedding-card {
            width: 90vw;
            max-width: 700px;
            background: white;
            border-radius: 20px;
            box-shadow: 
                0 30px 90px rgba(212, 175, 55, 0.3),
                0 10px 30px rgba(0, 0, 0, 0.1);
            padding: 30px;
            position: relative;
            overflow: hidden;
            animation: cardEntrance 1.5s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-style: preserve-3d;
        }

        /* Container pour l'image d'invitation */
        .invitation-image-container {
            width: 100%;
            position: relative;
            z-index: 10;
            opacity: 0;
            animation: fadeIn 1s ease-out 0.5s forwards;
        }

        .invitation-image {
            width: 100%;
            height: auto;
            display: block;
            border-radius: 10px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        @keyframes cardEntrance {
            0% {
                opacity: 0;
                transform: rotateY(-30deg) translateY(50px) scale(0.8);
            }
            100% {
                opacity: 1;
                transform: rotateY(0) translateY(0) scale(1);
            }
        }

        /* Bordure décorative animée */
        .card-border {
            position: absolute;
            top: 20px;
            left: 20px;
            right: 20px;
            bottom: 20px;
            border: 2px solid var(--primary);
            border-radius: 15px;
            pointer-events: none;
            animation: borderPulse 3s ease-in-out infinite;
        }

        @keyframes borderPulse {
            0%, 100% {
                opacity: 0.5;
                transform: scale(1);
            }
            50% {
                opacity: 1;
                transform: scale(1.01);
            }
        }

        /* Coins décoratifs */
        .corner-decoration {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 2px solid var(--primary);
            opacity: 0;
            animation: cornerFade 2s ease-in-out forwards;
        }

        .corner-decoration.top-left {
            top: 30px;
            left: 30px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 10px;
            animation-delay: 0.5s;
        }

        .corner-decoration.top-right {
            top: 30px;
            right: 30px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: 10px;
            animation-delay: 0.7s;
        }

        .corner-decoration.bottom-left {
            bottom: 30px;
            left: 30px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: 10px;
            animation-delay: 0.9s;
        }

        .corner-decoration.bottom-right {
            bottom: 30px;
            right: 30px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 10px;
            animation-delay: 1.1s;
        }

        @keyframes cornerFade {
            to {
                opacity: 0.6;
            }
        }

        /* En-tête avec ornements */
        .header {
            text-align: center;
            margin-bottom: 40px;
            position: relative;
        }

        .ornament {
            font-size: 40px;
            color: var(--primary);
            animation: rotateOrnament 4s ease-in-out infinite;
            display: inline-block;
            margin: 0 20px;
        }

        @keyframes rotateOrnament {
            0%, 100% {
                transform: rotate(0deg) scale(1);
            }
            50% {
                transform: rotate(180deg) scale(1.2);
            }
        }

        .title {
            font-family: 'Playfair Display', serif;
            font-size: 48px;
            font-weight: 900;
            color: var(--secondary);
            margin: 20px 0;
            letter-spacing: 3px;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: titleGlow 3s ease-in-out infinite;
        }

        @keyframes titleGlow {
            0%, 100% {
                filter: drop-shadow(0 0 5px rgba(212, 175, 55, 0.3));
            }
            50% {
                filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.6));
            }
        }

        .subtitle {
            font-size: 18px;
            color: var(--accent);
            letter-spacing: 4px;
            text-transform: uppercase;
            opacity: 0;
            animation: fadeInUp 1s ease-out 1s forwards;
        }

        /* Texte d'introduction */
        .intro-text {
            text-align: center;
            font-size: 18px;
            line-height: 1.8;
            color: var(--secondary);
            font-style: italic;
            margin: 30px 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 1.2s forwards;
        }

        @keyframes fadeInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }

        /* Section des noms */
        .names {
            text-align: center;
            margin: 50px 0;
            position: relative;
        }

        .name {
            font-family: 'Playfair Display', serif;
            font-size: 56px;
            font-weight: 700;
            color: var(--secondary);
            display: block;
            opacity: 0;
            animation: nameReveal 1.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        .name:first-child {
            animation-delay: 1.5s;
        }

        .name:last-child {
            animation-delay: 2s;
        }

        @keyframes nameReveal {
            0% {
                opacity: 0;
                transform: translateX(-50px) rotate(-5deg);
            }
            100% {
                opacity: 1;
                transform: translateX(0) rotate(0);
            }
        }

        .ampersand {
            font-family: 'Playfair Display', serif;
            font-size: 72px;
            color: var(--primary);
            margin: 20px 0;
            display: inline-block;
            animation: ampersandSpin 2s ease-in-out 2.5s forwards;
            opacity: 0;
        }

        @keyframes ampersandSpin {
            0% {
                opacity: 0;
                transform: rotate(-180deg) scale(0);
            }
            60% {
                transform: rotate(20deg) scale(1.3);
            }
            100% {
                opacity: 1;
                transform: rotate(0) scale(1);
            }
        }

        /* Ligne décorative */
        .divider {
            height: 2px;
            background: linear-gradient(90deg, transparent 0%, var(--primary) 50%, transparent 100%);
            margin: 40px 0;
            position: relative;
            overflow: hidden;
        }

        .divider::after {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent 0%, white 50%, transparent 100%);
            animation: shimmer 3s infinite;
        }

        @keyframes shimmer {
            to {
                left: 100%;
            }
        }

        /* Détails de l'événement */
        .details {
            text-align: center;
            margin: 40px 0;
        }

        .detail-item {
            margin: 20px 0;
            opacity: 0;
            animation: fadeIn 1s ease-out forwards;
        }

        .detail-item:nth-child(1) { animation-delay: 3s; }
        .detail-item:nth-child(2) { animation-delay: 3.2s; }
        .detail-item:nth-child(3) { animation-delay: 3.4s; }

        @keyframes fadeIn {
            to {
                opacity: 1;
            }
        }

        .detail-label {
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 600;
        }

        .detail-value {
            font-size: 24px;
            color: var(--secondary);
            margin-top: 5px;
            font-weight: 400;
        }

        /* Message */
        .message {
            text-align: center;
            font-size: 20px;
            line-height: 1.8;
            color: var(--secondary);
            font-style: italic;
            margin: 40px 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 3.8s forwards;
        }

        /* Information réception */
        .reception-info {
            text-align: center;
            margin: 35px 0;
            opacity: 0;
            animation: fadeIn 1s ease-out 3.6s forwards;
        }

        .reception-info p {
            font-size: 18px;
            color: var(--secondary);
            margin: 8px 0;
            line-height: 1.6;
        }

        .venue-name {
            font-family: 'Playfair Display', serif;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin: 15px 0 5px 0 !important;
            letter-spacing: 1px;
        }

        .venue-detail {
            font-size: 16px;
            color: var(--accent);
            font-style: italic;
        }

        /* Code vestimentaire */
        .dress-code {
            text-align: center;
            margin: 35px 0 20px 0;
            padding: 20px;
            background: linear-gradient(135deg, rgba(212, 175, 55, 0.1) 0%, rgba(232, 198, 168, 0.1) 100%);
            border-radius: 15px;
            border: 2px solid var(--primary);
            opacity: 0;
            animation: fadeIn 1s ease-out 4s forwards;
        }

        .dress-code-label {
            display: block;
            font-size: 14px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--primary);
            font-weight: 600;
            margin-bottom: 8px;
        }

        .dress-code-value {
            display: block;
            font-family: 'Playfair Display', serif;
            font-size: 24px;
            font-weight: 700;
            color: var(--secondary);
            letter-spacing: 1px;
        }

        /* Cœurs flottants */
        .floating-hearts {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }

        .heart {
            position: absolute;
            font-size: 30px;
            opacity: 0;
            animation: heartFloat 6s infinite ease-in-out;
        }

        .heart:nth-child(1) { left: 10%; animation-delay: 0s; }
        .heart:nth-child(2) { left: 30%; animation-delay: 2s; }
        .heart:nth-child(3) { left: 50%; animation-delay: 4s; }
        .heart:nth-child(4) { left: 70%; animation-delay: 1s; }
        .heart:nth-child(5) { left: 90%; animation-delay: 3s; }

        @keyframes heartFloat {
            0%, 100% {
                transform: translateY(100%) scale(0) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.8;
            }
            90% {
                opacity: 0;
            }
            50% {
                transform: translateY(-50%) scale(1) rotate(360deg);
            }
        }

        /* Bouton interactif */
        .rsvp-button {
            display: block;
            margin: 50px auto 20px;
            padding: 18px 50px;
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-family: 'Cormorant Garamond', serif;
            font-size: 20px;
            font-weight: 600;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            opacity: 0;
            animation: fadeIn 1s ease-out 4.2s forwards;
            position: relative;
            overflow: hidden;
        }

        .rsvp-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .rsvp-button:hover {
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.5);
        }

        .rsvp-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .rsvp-button:active {
            transform: translateY(-2px) scale(1.02);
        }

        /* Effet de confettis au clic */
        .confetti {
            position: fixed;
            width: 10px;
            height: 10px;
            background: var(--primary);
            pointer-events: none;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            to {
                transform: translateY(100vh) rotate(720deg);
                opacity: 0;
            }
        }

        /* Animation des portes */
        .doors-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 9999;
            pointer-events: none;
            background: radial-gradient(circle at center, rgba(26, 26, 46, 0.95) 0%, rgba(10, 10, 20, 0.98) 100%);
        }

        .door {
            position: absolute;
            top: 0;
            width: 50%;
            height: 100%;
            background: 
                linear-gradient(180deg, 
                    rgba(139, 69, 19, 0.2) 0%,
                    rgba(101, 67, 33, 0.3) 50%,
                    rgba(139, 69, 19, 0.2) 100%
                ),
                linear-gradient(135deg, 
                    #2a1810 0%, 
                    #3d2817 25%,
                    #1a1a2e 50%,
                    #3d2817 75%,
                    #2a1810 100%
                );
            transition: transform 2s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            overflow: hidden;
            box-shadow: inset 0 0 100px rgba(0, 0, 0, 0.5);
        }

        /* Texture bois luxueuse */
        .door::before {
            content: '';
            position: absolute;
            top: 0;
            width: 100%;
            height: 100%;
            background-image: 
                repeating-linear-gradient(
                    90deg,
                    transparent,
                    transparent 3px,
                    rgba(139, 69, 19, 0.15) 3px,
                    rgba(139, 69, 19, 0.15) 6px
                ),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 80px,
                    rgba(101, 67, 33, 0.2) 80px,
                    rgba(101, 67, 33, 0.2) 160px
                );
            opacity: 0.8;
        }

        /* Motifs décoratifs gravés */
        .door::after {
            content: '';
            position: absolute;
            top: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 70%;
            height: 80%;
            background-image: 
                radial-gradient(circle at 50% 20%, transparent 30%, rgba(212, 175, 55, 0.05) 31%, transparent 32%),
                radial-gradient(circle at 50% 50%, transparent 35%, rgba(212, 175, 55, 0.05) 36%, transparent 37%),
                radial-gradient(circle at 50% 80%, transparent 30%, rgba(212, 175, 55, 0.05) 31%, transparent 32%),
                repeating-linear-gradient(
                    0deg,
                    transparent,
                    transparent 15%,
                    rgba(212, 175, 55, 0.08) 15%,
                    rgba(212, 175, 55, 0.08) 16%,
                    transparent 16%,
                    transparent 30%
                );
            border: 1px solid rgba(212, 175, 55, 0.3);
            border-radius: 10px;
            box-shadow: 
                inset 0 0 30px rgba(212, 175, 55, 0.1),
                0 0 20px rgba(212, 175, 55, 0.2);
        }

        .door-left {
            left: 0;
            transform-origin: left;
            border-right: 5px solid;
            border-image: linear-gradient(
                180deg,
                var(--primary) 0%,
                #f4d03f 25%,
                var(--primary) 50%,
                #b8860b 75%,
                var(--primary) 100%
            ) 1;
        }

        .door-right {
            right: 0;
            transform-origin: right;
            border-left: 5px solid;
            border-image: linear-gradient(
                180deg,
                var(--primary) 0%,
                #f4d03f 25%,
                var(--primary) 50%,
                #b8860b 75%,
                var(--primary) 100%
            ) 1;
        }

        .doors-container.open .door-left {
            transform: perspective(1200px) rotateY(-120deg);
        }

        .doors-container.open .door-right {
            transform: perspective(1200px) rotateY(120deg);
        }

        /* Cadres décoratifs sur les portes */
        .ornamental-frame {
            position: absolute;
            top: 15%;
            width: 60%;
            height: 70%;
            border: 3px solid var(--primary);
            border-radius: 15px;
            box-shadow: 
                inset 0 0 30px rgba(212, 175, 55, 0.3),
                0 0 30px rgba(212, 175, 55, 0.4),
                inset 0 0 60px rgba(0, 0, 0, 0.3);
            background: radial-gradient(
                ellipse at center,
                rgba(212, 175, 55, 0.05) 0%,
                transparent 70%
            );
        }

        .door-left .ornamental-frame {
            right: 12%;
        }

        .door-right .ornamental-frame {
            left: 12%;
        }

        /* Motifs floraux dans les cadres */
        .ornamental-frame::before,
        .ornamental-frame::after {
            content: '✦';
            position: absolute;
            font-size: 30px;
            color: var(--primary);
            text-shadow: 0 0 20px rgba(212, 175, 55, 0.8);
            animation: twinkle 3s ease-in-out infinite;
        }

        .ornamental-frame::before {
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        .ornamental-frame::after {
            bottom: -15px;
            left: 50%;
            transform: translateX(-50%);
        }

        @keyframes twinkle {
            0%, 100% {
                opacity: 0.5;
                transform: translateX(-50%) scale(1);
            }
            50% {
                opacity: 1;
                transform: translateX(-50%) scale(1.3);
            }
        }

        /* Coins décoratifs des cadres */
        .frame-corner {
            position: absolute;
            width: 40px;
            height: 40px;
            border: 2px solid var(--primary);
        }

        .frame-corner.tl {
            top: -2px;
            left: -2px;
            border-right: none;
            border-bottom: none;
            border-top-left-radius: 15px;
        }

        .frame-corner.tr {
            top: -2px;
            right: -2px;
            border-left: none;
            border-bottom: none;
            border-top-right-radius: 15px;
        }

        .frame-corner.bl {
            bottom: -2px;
            left: -2px;
            border-right: none;
            border-top: none;
            border-bottom-left-radius: 15px;
        }

        .frame-corner.br {
            bottom: -2px;
            right: -2px;
            border-left: none;
            border-top: none;
            border-bottom-right-radius: 15px;
        }

        /* Ornements sur les portes */
        .door-ornament {
            position: absolute;
            top: 50%;
            font-size: 150px;
            background: linear-gradient(135deg, #f4d03f 0%, var(--primary) 50%, #b8860b 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            transform: translateY(-50%);
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.8));
            animation: ornamentFloat 4s ease-in-out infinite;
        }

        .door-left .door-ornament {
            right: 15%;
        }

        .door-right .door-ornament {
            left: 15%;
        }

        @keyframes ornamentFloat {
            0%, 100% {
                transform: translateY(-50%) scale(1) rotate(0deg);
                filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.6));
            }
            50% {
                transform: translateY(-50%) scale(1.1) rotate(5deg);
                filter: drop-shadow(0 0 50px rgba(212, 175, 55, 1));
            }
        }

        /* Poignées de porte luxueuses */
        .door-handle {
            position: absolute;
            top: 50%;
            width: 30px;
            height: 120px;
            background: linear-gradient(
                180deg,
                #f4d03f 0%,
                var(--primary) 20%,
                #ffd700 40%,
                var(--primary) 60%,
                #b8860b 80%,
                var(--primary) 100%
            );
            border-radius: 15px;
            transform: translateY(-50%);
            box-shadow: 
                0 10px 30px rgba(0, 0, 0, 0.5),
                inset 0 2px 10px rgba(255, 255, 255, 0.5),
                inset 0 -2px 10px rgba(0, 0, 0, 0.3),
                0 0 30px rgba(212, 175, 55, 0.6);
            border: 2px solid rgba(255, 215, 0, 0.3);
            animation: handleGlow 2s ease-in-out infinite;
        }

        @keyframes handleGlow {
            0%, 100% {
                box-shadow: 
                    0 10px 30px rgba(0, 0, 0, 0.5),
                    inset 0 2px 10px rgba(255, 255, 255, 0.5),
                    inset 0 -2px 10px rgba(0, 0, 0, 0.3),
                    0 0 30px rgba(212, 175, 55, 0.6);
            }
            50% {
                box-shadow: 
                    0 10px 30px rgba(0, 0, 0, 0.5),
                    inset 0 2px 10px rgba(255, 255, 255, 0.7),
                    inset 0 -2px 10px rgba(0, 0, 0, 0.3),
                    0 0 50px rgba(212, 175, 55, 1);
            }
        }

        .door-handle::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.8) 0%,
                var(--primary) 30%,
                transparent 70%
            );
            border-radius: 50%;
            box-shadow: 
                inset 0 0 15px rgba(255, 255, 255, 0.5),
                0 0 20px rgba(212, 175, 55, 0.8);
            border: 2px solid rgba(255, 215, 0, 0.5);
        }

        .door-handle::after {
            content: '';
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            width: 15px;
            height: 15px;
            background: radial-gradient(
                circle,
                rgba(255, 255, 255, 0.9) 0%,
                rgba(255, 215, 0, 0.8) 50%,
                transparent 100%
            );
            border-radius: 50%;
        }

        .door-left .door-handle {
            right: 40px;
        }

        .door-right .door-handle {
            left: 40px;
        }

        /* Lignes décoratives verticales */
        .door-line {
            position: absolute;
            top: 10%;
            width: 2px;
            height: 80%;
            background: linear-gradient(
                180deg,
                transparent 0%,
                var(--primary) 5%,
                var(--primary) 95%,
                transparent 100%
            );
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.5);
            opacity: 0.6;
        }

        .door-left .door-line:nth-of-type(1) {
            left: 15%;
        }

        .door-left .door-line:nth-of-type(2) {
            left: 25%;
        }

        .door-right .door-line:nth-of-type(1) {
            right: 15%;
        }

        .door-right .door-line:nth-of-type(2) {
            right: 25%;
        }

        /* Filigrane décoratif en haut et bas */
        .door-filigree {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 60px;
            background-image: 
                radial-gradient(circle at 50% 50%, var(--primary) 1px, transparent 1px),
                radial-gradient(circle at 25% 50%, var(--primary) 1px, transparent 1px),
                radial-gradient(circle at 75% 50%, var(--primary) 1px, transparent 1px);
            background-size: 40px 40px, 40px 40px, 40px 40px;
            background-position: center, left, right;
            opacity: 0.4;
            filter: blur(0.5px);
        }

        .door-filigree.top {
            top: 5%;
        }

        .door-filigree.bottom {
            bottom: 5%;
            transform: translateX(-50%) rotate(180deg);
        }

        /* Motifs arabesques */
        .arabesque {
            position: absolute;
            font-size: 40px;
            color: var(--primary);
            opacity: 0.4;
            text-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        }

        .door-left .arabesque:nth-of-type(1) {
            top: 25%;
            left: 20%;
        }

        .door-left .arabesque:nth-of-type(2) {
            top: 75%;
            left: 20%;
        }

        .door-right .arabesque:nth-of-type(1) {
            top: 25%;
            right: 20%;
        }

        .door-right .arabesque:nth-of-type(2) {
            top: 75%;
            right: 20%;
        }

        /* Bouton d'entrée */
        .enter-button {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            padding: 30px 70px;
            background: 
                linear-gradient(135deg, #2a1810 0%, #1a1a2e 100%),
                linear-gradient(135deg, var(--primary) 0%, #f4d03f 100%);
            background-clip: padding-box, border-box;
            background-origin: padding-box, border-box;
            color: var(--primary);
            border: 4px solid transparent;
            border-radius: 60px;
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 900;
            letter-spacing: 4px;
            text-transform: uppercase;
            cursor: pointer;
            pointer-events: all;
            position: relative;
            overflow: hidden;
            box-shadow: 
                0 0 40px rgba(212, 175, 55, 0.8),
                0 20px 60px rgba(212, 175, 55, 0.4),
                inset 0 1px 20px rgba(212, 175, 55, 0.3);
            animation: buttonPulse 2s infinite;
            transition: all 0.3s ease;
            z-index: 10000;
            text-shadow: 
                0 0 20px rgba(212, 175, 55, 0.8),
                0 0 40px rgba(212, 175, 55, 0.5);
        }

        .enter-button::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                45deg,
                transparent 30%,
                rgba(212, 175, 55, 0.3) 50%,
                transparent 70%
            );
            animation: buttonShine 3s linear infinite;
        }

        @keyframes buttonShine {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes buttonPulse {
            0%, 100% {
                box-shadow: 
                    0 0 40px rgba(212, 175, 55, 0.8),
                    0 20px 60px rgba(212, 175, 55, 0.4),
                    inset 0 1px 20px rgba(212, 175, 55, 0.3),
                    0 0 0 0 rgba(212, 175, 55, 0.7);
            }
            50% {
                box-shadow: 
                    0 0 60px rgba(212, 175, 55, 1),
                    0 20px 80px rgba(212, 175, 55, 0.6),
                    inset 0 1px 30px rgba(212, 175, 55, 0.5),
                    0 0 0 40px rgba(212, 175, 55, 0);
            }
        }

        .enter-button:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background: 
                linear-gradient(135deg, #3d2817 0%, #2a1a3e 100%),
                linear-gradient(135deg, #f4d03f 0%, var(--primary) 100%);
            text-shadow: 
                0 0 30px rgba(212, 175, 55, 1),
                0 0 50px rgba(212, 175, 55, 0.7);
        }

        .enter-button:active {
            transform: translate(-50%, -50%) scale(1.05);
        }

        .doors-container.open .enter-button {
            opacity: 0;
            transform: translate(-50%, -50%) scale(0);
            transition: all 0.5s ease;
        }

        /* Lumière derrière les portes */
        .light-behind {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(244, 208, 63, 0.8) 0%, transparent 70%);
            transform: translate(-50%, -50%);
            opacity: 0;
            transition: opacity 1s ease;
        }

        .doors-container.open .light-behind {
            opacity: 1;
            animation: lightExpand 2s ease-out forwards;
        }

        @keyframes lightExpand {
            to {
                width: 800px;
                height: 800px;
            }
        }

        /* Masquer la carte initialement */
        .card-container {
            opacity: 0;
            transform: scale(0.8);
            transition: opacity 1s ease 1.5s, transform 1s ease 1.5s;
        }

        .doors-container.open ~ .card-container {
            opacity: 1;
            transform: scale(1);
        }

        /* Particules initiales masquées */
        .particles {
            opacity: 0;
            transition: opacity 1s ease 1.5s;
        }

        .doors-container.open ~ .particles {
            opacity: 1;
        }

        /* Étincelles lors de l'ouverture */
        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            pointer-events: none;
            animation: sparkleFly 1.5s ease-out forwards;
        }

        @keyframes sparkleFly {
            0% {
                opacity: 1;
                transform: translate(0, 0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translate(var(--tx), var(--ty)) scale(0);
            }
        }

        /* Texte de bienvenue sur les portes */
        .welcome-text {
            position: absolute;
            top: 18%;
            left: 50%;
            transform: translateX(-50%);
            font-family: 'Playfair Display', serif;
            font-size: 64px;
            font-weight: 900;
            background: linear-gradient(135deg, #f4d03f 0%, var(--primary) 50%, #ffd700 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-align: center;
            filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.8));
            letter-spacing: 6px;
            animation: welcomeFloat 3s ease-in-out infinite;
            z-index: 10001;
        }

        @keyframes welcomeFloat {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
                filter: drop-shadow(0 0 30px rgba(212, 175, 55, 0.8));
            }
            50% {
                transform: translateX(-50%) translateY(-15px);
                filter: drop-shadow(0 0 50px rgba(212, 175, 55, 1));
            }
        }

        .welcome-text-small {
            display: block;
            font-size: 28px;
            margin-top: 15px;
            letter-spacing: 8px;
            text-transform: uppercase;
            font-weight: 400;
            background: linear-gradient(135deg, var(--primary) 0%, #e8c6a8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .doors-container.open .welcome-text {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        /* Rayons dorés derrière le bouton */
        .golden-rays {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 400px;
            height: 400px;
            background: 
                conic-gradient(
                    from 0deg,
                    transparent 0deg,
                    rgba(212, 175, 55, 0.3) 10deg,
                    transparent 20deg,
                    transparent 40deg,
                    rgba(212, 175, 55, 0.3) 50deg,
                    transparent 60deg,
                    transparent 80deg,
                    rgba(212, 175, 55, 0.3) 90deg,
                    transparent 100deg,
                    transparent 120deg,
                    rgba(212, 175, 55, 0.3) 130deg,
                    transparent 140deg,
                    transparent 160deg,
                    rgba(212, 175, 55, 0.3) 170deg,
                    transparent 180deg,
                    transparent 200deg,
                    rgba(212, 175, 55, 0.3) 210deg,
                    transparent 220deg,
                    transparent 240deg,
                    rgba(212, 175, 55, 0.3) 250deg,
                    transparent 260deg,
                    transparent 280deg,
                    rgba(212, 175, 55, 0.3) 290deg,
                    transparent 300deg,
                    transparent 320deg,
                    rgba(212, 175, 55, 0.3) 330deg,
                    transparent 340deg,
                    transparent 360deg
                );
            animation: rotateRays 20s linear infinite;
            pointer-events: none;
        }

        @keyframes rotateRays {
            to {
                transform: translate(-50%, -50%) rotate(360deg);
            }
        }

        /* Overlay du formulaire */
        .form-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(26, 26, 46, 0.95);
            z-index: 10000;
            display: none;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
            animation: fadeIn 0.5s ease;
        }

        .form-overlay.active {
            display: flex;
        }

        /* Container du formulaire */
        .form-container {
            background: white;
            border-radius: 25px;
            padding: 50px 40px;
            width: 90%;
            max-width: 500px;
            position: relative;
            box-shadow: 
                0 50px 100px rgba(212, 175, 55, 0.4),
                0 20px 50px rgba(0, 0, 0, 0.3);
            transform: scale(0.8) translateY(50px);
            opacity: 0;
            animation: formEntrance 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
        }

        @keyframes formEntrance {
            to {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        /* Bouton de fermeture */
        .close-form {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--primary) 0%, #f4d03f 100%);
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.3);
        }

        .close-form:hover {
            transform: rotate(90deg) scale(1.1);
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.5);
        }

        /* Titre du formulaire */
        .form-title {
            font-family: 'Playfair Display', serif;
            font-size: 36px;
            font-weight: 900;
            text-align: center;
            background: linear-gradient(135deg, var(--secondary) 0%, var(--primary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            animation: titleGlow 3s ease-in-out infinite;
        }

        .form-subtitle {
            text-align: center;
            color: var(--accent);
            font-size: 16px;
            margin-bottom: 40px;
            font-style: italic;
        }

        /* Groupes de champs */
        .form-group {
            margin-bottom: 30px;
            position: relative;
            opacity: 0;
            animation: slideInUp 0.5s ease forwards;
        }

        .form-group:nth-child(1) { animation-delay: 0.4s; }
        .form-group:nth-child(2) { animation-delay: 0.5s; }
        .form-group:nth-child(3) { animation-delay: 0.6s; }

        @keyframes slideInUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
            from {
                opacity: 0;
                transform: translateY(20px);
            }
        }

        /* Labels */
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--secondary);
            margin-bottom: 10px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .form-label .required {
            color: var(--primary);
            margin-left: 3px;
        }

        /* Inputs */
        .form-input {
            width: 100%;
            padding: 15px 20px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            font-size: 16px;
            font-family: 'Cormorant Garamond', serif;
            transition: all 0.3s ease;
            background: white;
            color: var(--secondary);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(212, 175, 55, 0.1);
            transform: translateY(-2px);
        }

        .form-input::placeholder {
            color: #aaa;
            font-style: italic;
        }

        /* Icônes dans les inputs */
        .input-wrapper {
            position: relative;
        }

        .input-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            color: var(--primary);
            pointer-events: none;
            opacity: 0.6;
        }

        .form-input:focus ~ .input-icon {
            opacity: 1;
            animation: iconPulse 0.5s ease;
        }

        @keyframes iconPulse {
            0%, 100% { transform: translateY(-50%) scale(1); }
            50% { transform: translateY(-50%) scale(1.2); }
        }

        /* Bouton de soumission */
        .submit-button {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--primary) 0%, #f4d03f 100%);
            border: none;
            border-radius: 50px;
            color: white;
            font-family: 'Playfair Display', serif;
            font-size: 20px;
            font-weight: 700;
            letter-spacing: 2px;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.4);
            margin-top: 20px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: slideInUp 0.5s ease 0.7s forwards;
        }

        .submit-button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 40px rgba(212, 175, 55, 0.6);
        }

        .submit-button:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-button:active {
            transform: translateY(-1px);
        }

        .submit-button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* Animation de chargement */
        .submit-button.loading::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }

        @keyframes spin {
            to { transform: translateY(-50%) rotate(360deg); }
        }

        /* Message de succès */
        .success-message {
            display: none;
            text-align: center;
            padding: 30px;
            animation: fadeIn 0.5s ease;
        }

        .success-message.active {
            display: block;
        }

        .success-icon {
            font-size: 80px;
            margin-bottom: 20px;
            animation: successBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
        }

        @keyframes successBounce {
            0% { transform: scale(0); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .success-title {
            font-family: 'Playfair Display', serif;
            font-size: 32px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 15px;
        }

        .success-text {
            color: var(--secondary);
            font-size: 18px;
            line-height: 1.6;
        }

        /* Particules du formulaire */
        .form-particles {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            pointer-events: none;
            border-radius: 25px;
        }

        .form-particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: var(--primary);
            border-radius: 50%;
            opacity: 0.6;
            animation: floatParticle 4s infinite ease-in-out;
        }

        @keyframes floatParticle {
            0%, 100% {
                transform: translateY(0) translateX(0);
            }
            50% {
                transform: translateY(-20px) translateX(10px);
            }
        }

        /* Responsive formulaire */
        @media (max-width: 768px) {
            .form-container {
                padding: 40px 30px;
                width: 95%;
            }

            .form-title {
                font-size: 28px;
            }

            .form-subtitle {
                font-size: 14px;
            }

            .form-input {
                padding: 12px 15px;
                font-size: 16px;
            }

            .submit-button {
                font-size: 18px;
                padding: 15px;
            }
        }

        @media (max-width: 480px) {
            .form-container {
                padding: 30px 20px;
            }

            .form-title {
                font-size: 24px;
            }

            .close-form {
                width: 35px;
                height: 35px;
                font-size: 20px;
            }
        }

        /* Optimisations tactiles */
        @media (hover: none) and (pointer: coarse) {
            .form-input {
                font-size: 16px; /* Évite le zoom sur iOS */

            .submit-button,
            .close-form {
                -webkit-tap-highlight-color: transparent;

        }

                transform: none !important;
            }

            /* Augmente la zone tactile des boutons */
            .enter-button,
            .rsvp-button {
                min-height: 56px;
                position: relative;
            }

            .enter-button::after,
            .rsvp-button::after {
                content: '';
                position: absolute;
                top: -10px;
                left: -10px;
                right: -10px;
                bottom: -10px;
            }

            /* Désactive le hover sur tactile */
            .enter-button:hover,
            .rsvp-button:hover {
                transform: translate(-50%, -50%) scale(1);
            }

            /* Active le feedback tactile */
            .enter-button:active {
                transform: translate(-50%, -50%) scale(0.95);
            }

            .rsvp-button:active {
                transform: translateY(0) scale(0.95);
            }
        }

        /* Support pour les gestes de swipe */
        .swipe-indicator {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 14px;
            color: var(--primary);
            opacity: 0.7;
            animation: bounceIndicator 2s ease-in-out infinite;
            display: none;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        @media (max-width: 768px) {
            .swipe-indicator {
                display: block;
            }
        }

        @keyframes bounceIndicator {
            0%, 100% {
                transform: translateX(-50%) translateY(0);
            }
            50% {
                transform: translateX(-50%) translateY(-10px);
            }
        }

        .doors-container.open .swipe-indicator {
            display: none;
        }

        /* Animation de vibration au touch */
        @keyframes vibrate {
            0%, 100% { transform: translate(-50%, -50%) rotate(0deg); }
            25% { transform: translate(-50%, -50%) rotate(-2deg); }
            75% { transform: translate(-50%, -50%) rotate(2deg); }
        }

        .enter-button.vibrate {
            animation: vibrate 0.3s ease;
        }
    </style>
</head>

    <!-- Formulaire RSVP Modal -->
    <div class="form-overlay" id="formOverlay">
        <div class="form-container">
            <button class="close-form" onclick="closeForm()">×</button>
            
            <div class="form-particles">
                <div class="form-particle" style="left: 10%; top: 20%; animation-delay: 0s;"></div>
                <div class="form-particle" style="left: 30%; top: 40%; animation-delay: 1s;"></div>
                <div class="form-particle" style="left: 60%; top: 30%; animation-delay: 2s;"></div>
                <div class="form-particle" style="left: 80%; top: 60%; animation-delay: 1.5s;"></div>
                <div class="form-particle" style="left: 50%; top: 80%; animation-delay: 0.5s;"></div>
            </div>

            <div id="formContent">
                <h2 class="form-title">Confirmation de présence</h2>
                <p class="form-subtitle">Nous serions honorés de votre présence</p>

                <form id="rsvpForm" onsubmit="submitForm(event)">
                    <div class="form-group">
                        <label class="form-label">
                            Nom complet<span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                class="form-input" 
                                id="fullName" 
                                name="fullName"
                                placeholder="Entrez votre nom complet"
                                required
                            >
                            <span class="input-icon">👤</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Numéro de téléphone<span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="tel" 
                                class="form-input" 
                                id="phone" 
                                name="phone"
                                placeholder="+225 XX XX XX XX XX"
                                required
                            >
                            <span class="input-icon">📱</span>
                        </div>
                    </div>

                    <div class="form-group">
                        <label class="form-label">
                            Ville de résidence<span class="required">*</span>
                        </label>
                        <div class="input-wrapper">
                            <input 
                                type="text" 
                                class="form-input" 
                                id="city" 
                                name="city"
                                placeholder="Entrez votre ville"
                                required
                            >
                            <span class="input-icon">📍</span>
                        </div>
                    </div>

                    <button type="submit" class="submit-button" id="submitBtn">
                        Confirmer ma présence
                    </button>
                </form>
            </div>

            <div class="success-message" id="successMessage">
                <div class="success-icon">✅</div>
                <h3 class="success-title">Merci !</h3>
                <p class="success-text">
                    Votre confirmation a été envoyée avec succès.<br>
                    Nous avons hâte de vous voir !
                </p>
            </div>
        </div>
    </div>

    <script>
        // Détection mobile
        const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
        const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

        // Variables pour les gestes
        let touchStartX = 0;
        let touchStartY = 0;
        let touchEndX = 0;
        let touchEndY = 0;

        // Fonction d'ouverture des portes
        function openDoors() {
            const doors = document.getElementById('doors');
            const button = document.querySelector('.enter-button');
            
            // Vibration tactile sur mobile
            if (navigator.vibrate) {
                navigator.vibrate([50, 30, 50]);
            }
            
            // Animation de feedback visuel
            button.classList.add('vibrate');
            setTimeout(() => button.classList.remove('vibrate'), 300);
            
            doors.classList.add('open');
            
            // Créer des étincelles
            createSparkles();
            
            // Supprimer les portes après l'animation
            setTimeout(() => {
                doors.style.display = 'none';
            }, 3000);
        }

        // Créer des étincelles lors de l'ouverture
        function createSparkles() {
            const sparkleCount = isMobile ? 30 : 50; // Moins de particules sur mobile
            for (let i = 0; i < sparkleCount; i++) {
                setTimeout(() => {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    
                    // Position aléatoire au centre
                    const x = window.innerWidth / 2 + (Math.random() - 0.5) * 100;
                    const y = window.innerHeight / 2 + (Math.random() - 0.5) * 100;
                    sparkle.style.left = x + 'px';
                    sparkle.style.top = y + 'px';
                    
                    // Direction aléatoire
                    const tx = (Math.random() - 0.5) * 600;
                    const ty = (Math.random() - 0.5) * 600;
                    sparkle.style.setProperty('--tx', tx + 'px');
                    sparkle.style.setProperty('--ty', ty + 'px');
                    
                    document.body.appendChild(sparkle);
                    
                    setTimeout(() => sparkle.remove(), 1500);
                }, i * 20);
            }
        }

        // Génération des particules de fond
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = isMobile ? 15 : 30; // Moins de particules sur mobile
            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.width = Math.random() * 6 + 2 + 'px';
                particle.style.height = particle.style.width;
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 8 + 's';
                particle.style.animationDuration = Math.random() * 4 + 6 + 's';
                particlesContainer.appendChild(particle);
            }
        }

        // Effet confettis
        function createConfetti(x, y) {
            const colors = ['#d4af37', '#e8c6a8', '#1a1a2e', '#ff69b4', '#ffd700'];
            const confettiCount = isMobile ? 20 : 30;
            for (let i = 0; i < confettiCount; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = x + 'px';
                confetti.style.top = y + 'px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.setProperty('--tx', (Math.random() - 0.5) * 400 + 'px');
                document.body.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Fonction de célébration - ouvre le formulaire
        function celebrate() {
            const formOverlay = document.getElementById('formOverlay');
            formOverlay.classList.add('active');
            
            // Vibration
            if (navigator.vibrate) {
                navigator.vibrate([100, 50, 100]);
            }
            
            // Empêche le scroll du body
            document.body.style.overflow = 'hidden';
        }

        // Fermer le formulaire
        function closeForm() {
            const formOverlay = document.getElementById('formOverlay');
            formOverlay.classList.remove('active');
            document.body.style.overflow = 'auto';
            
            // Reset du formulaire
            document.getElementById('rsvpForm').reset();
            document.getElementById('formContent').style.display = 'block';
            document.getElementById('successMessage').classList.remove('active');
        }

        // Soumettre le formulaire
        async function submitForm(event) {
            event.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const fullName = document.getElementById('fullName').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const city = document.getElementById('city').value.trim();
            
            // Animation de chargement
            submitBtn.classList.add('loading');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Envoi en cours...';
            
            // Vibration
            if (navigator.vibrate) {
                navigator.vibrate(50);
            }
            
            // Construction du message WhatsApp
            const message = `🎊 *CONFIRMATION DE PRÉSENCE* 🎊

*Mariage de Ousmane & Charlène*
📅 Samedi 11 Juillet 2026 à 11h
📍 Mairie de Cocody

👤 *Nom:* ${fullName}
📱 *Téléphone:* ${phone}
🏙️ *Ville:* ${city}

Je confirme ma présence à cette merveilleuse célébration ! ✨`;

            // Encoder le message pour URL
            const encodedMessage = encodeURIComponent(message);
            const whatsappNumber = '2250708342251';
            const whatsappURL = `https://wa.me/${whatsappNumber}?text=${encodedMessage}`;
            
            // Simulation de délai pour l'effet
            setTimeout(() => {
                // Ouvrir WhatsApp
                window.open(whatsappURL, '_blank');
                
                // Afficher le message de succès
                submitBtn.classList.remove('loading');
                submitBtn.disabled = false;
                submitBtn.textContent = 'Confirmer ma présence';
                
                document.getElementById('formContent').style.display = 'none';
                document.getElementById('successMessage').classList.add('active');
                
                // Créer des confettis
                createFormConfetti();
                
                // Vibration de succès
                if (navigator.vibrate) {
                    navigator.vibrate([100, 50, 100, 50, 100]);
                }
                
                // Fermer automatiquement après 4 secondes
                setTimeout(() => {
                    closeForm();
                }, 4000);
            }, 1000);
        }

        // Confettis pour le formulaire
        function createFormConfetti() {
            const colors = ['#d4af37', '#f4d03f', '#1a2b5c', '#ff69b4', '#ffd700'];
            const overlay = document.getElementById('formOverlay');
            
            for (let i = 0; i < 50; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.top = '0px';
                confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                confetti.style.setProperty('--tx', (Math.random() - 0.5) * 400 + 'px');
                overlay.appendChild(confetti);

                setTimeout(() => confetti.remove(), 3000);
            }
        }

        // Fermer le formulaire en cliquant sur l'overlay
        document.addEventListener('click', (e) => {
            const formOverlay = document.getElementById('formOverlay');
            if (e.target === formOverlay) {
                closeForm();
            }
        });

        // Fermer avec la touche Escape
        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') {
                const formOverlay = document.getElementById('formOverlay');
                if (formOverlay.classList.contains('active')) {
                    closeForm();
                }
            }
        });

        // Effet de parallaxe au mouvement de la souris (desktop uniquement)
        if (!isMobile && !isTouch) {
            document.addEventListener('mousemove', (e) => {
                const card = document.querySelector('.wedding-card');
                if (card) {
                    const x = (e.clientX / window.innerWidth - 0.5) * 20;
                    const y = (e.clientY / window.innerHeight - 0.5) * 20;
                    card.style.transform = `rotateY(${x}deg) rotateX(${-y}deg)`;
                }
            });
        }

        // Gestion des gestes tactiles sur la carte
        if (isTouch) {
            const card = document.querySelector('.wedding-card');
            
            // Swipe horizontal pour effet interactif
            document.addEventListener('touchstart', (e) => {
                touchStartX = e.changedTouches[0].screenX;
                touchStartY = e.changedTouches[0].screenY;
            }, { passive: true });

            document.addEventListener('touchend', (e) => {
                touchEndX = e.changedTouches[0].screenX;
                touchEndY = e.changedTouches[0].screenY;
                handleSwipe();
            }, { passive: true });

            function handleSwipe() {
                const diffX = touchEndX - touchStartX;
                const diffY = touchEndY - touchStartY;
                const threshold = 50;

                // Swipe horizontal
                if (Math.abs(diffX) > Math.abs(diffY) && Math.abs(diffX) > threshold) {
                    if (diffX > 0) {
                        // Swipe droite - mini animation
                        if (card) {
                            card.style.transition = 'transform 0.3s ease';
                            card.style.transform = 'translateX(10px)';
                            setTimeout(() => {
                                card.style.transform = 'translateX(0)';
                            }, 300);
                        }
                    } else {
                        // Swipe gauche - mini animation
                        if (card) {
                            card.style.transition = 'transform 0.3s ease';
                            card.style.transform = 'translateX(-10px)';
                            setTimeout(() => {
                                card.style.transform = 'translateX(0)';
                            }, 300);
                        }
                    }
                }
            }

            // Tap pour créer des particules
            let tapCount = 0;
            let tapTimer;
            
            document.addEventListener('touchend', (e) => {
                tapCount++;
                
                if (tapCount === 2) {
                    // Double tap - crée des étincelles
                    const touch = e.changedTouches[0];
                    createMiniSparkles(touch.clientX, touch.clientY);
                    tapCount = 0;
                }
                
                clearTimeout(tapTimer);
                tapTimer = setTimeout(() => {
                    tapCount = 0;
                }, 300);
            }, { passive: true });

            function createMiniSparkles(x, y) {
                for (let i = 0; i < 10; i++) {
                    const sparkle = document.createElement('div');
                    sparkle.className = 'sparkle';
                    sparkle.style.left = x + 'px';
                    sparkle.style.top = y + 'px';
                    
                    const tx = (Math.random() - 0.5) * 200;
                    const ty = (Math.random() - 0.5) * 200;
                    sparkle.style.setProperty('--tx', tx + 'px');
                    sparkle.style.setProperty('--ty', ty + 'px');
                    
                    document.body.appendChild(sparkle);
                    setTimeout(() => sparkle.remove(), 1500);
                }
                
                if (navigator.vibrate) {
                    navigator.vibrate(30);
                }
            }
        }

        // Gestion de l'orientation mobile
        if (isMobile) {
            window.addEventListener('orientationchange', () => {
                setTimeout(() => {
                    // Recalcule les positions après rotation
                    const card = document.querySelector('.wedding-card');
                    if (card) {
                        card.style.transition = 'none';
                        setTimeout(() => {
                            card.style.transition = '';
                        }, 100);
                    }
                }, 100);
            });
        }

        // Préchargement pour de meilleures performances
        window.addEventListener('load', () => {
            // Force le rendu des animations
            document.body.style.opacity = '1';
        });

        // Initialisation
        createParticles();

        // Désactive le zoom par pinch sur mobile (optionnel)
        document.addEventListener('touchmove', (e) => {
            if (e.touches.length > 1) {
                e.preventDefault();
            }
        }, { passive: false });

        // Empêche le menu contextuel long-press sur mobile
        window.addEventListener('contextmenu', (e) => {
            if (isMobile) {
                e.preventDefault();
            }
        });
    </script>
</body>
</html>
